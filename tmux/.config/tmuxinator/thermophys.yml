name: thermophys
root: ~/thermophys/repo/

on_project_start:
  - xdotool windowstate --add MAXIMIZED_HORZ $(xdotool getactivewindow)

on_project_exit:
  - xdotool windowstate --remove MAXIMIZED_HORZ $(xdotool getactivewindow)

windows:
  - dev:
      layout: even-horizontal
      root: ~/thermophys/repo
      panes:
        - tp-api:
          - cd tp-api
          - mise dev
        - thermophys-backend:
          - cd thermophys-backend
          - mise dev
        - thermophys-frontend:
          - cd thermophys-frontend
          - mise dev
